name: Deploy to Xserver (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP Deploy to Xserver
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /rcx-service.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            .gitignore
