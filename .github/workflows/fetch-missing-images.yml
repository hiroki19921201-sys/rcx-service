name: Fetch Missing Images

on:
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Download missing images from production
        run: |
          cd images
          curl -sL -o syouhin_1.png "https://rcx-service.com/images/syouhin_1.png"
          curl -sL -o shutterstock_2454686623.png "https://rcx-service.com/images/shutterstock_2454686623.png"
          curl -sL -o certification-sp.jpg "https://rcx-service.com/images/certification-sp.jpg"
          ls -la syouhin_1.png shutterstock_2454686623.png certification-sp.jpg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/syouhin_1.png images/shutterstock_2454686623.png images/certification-sp.jpg
          git commit -m "Add missing images from production site"
          git push origin develop
