<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | RCX SALES</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }
    .thanks-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .thanks-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 60px 40px; text-align: center; max-width: 600px; width: 100%; }
    .thanks-icon { width: 80px; height: 80px; background: #f39800; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .thanks-icon svg { width: 40px; height: 40px; fill: #fff; }
    .thanks-title { font-size: 24px; font-weight: 700; color: #333; margin-bottom: 16px; }
    .thanks-message { font-size: 15px; color: #666; line-height: 1.8; margin-bottom: 32px; }
    .thanks-btn { display: inline-block; background: #f39800; color: #fff; text-decoration: none; padding: 14px 48px; border-radius: 50px; font-size: 15px; font-weight: 700; letter-spacing: 1px; transition: background 0.3s; }
    .thanks-btn:hover { background: #e08900; }
    .thanks-header { background: #222; padding: 16px 0; text-align: center; }
    .thanks-header-text { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .thanks-footer { background: #222; color: #999; text-align: center; padding: 20px; font-size: 12px; }
    @media (max-width: 768px) { .thanks-card { padding: 40px 24px; } .thanks-title { font-size: 20px; } }
  </style>
</head>
<body>
  <div class="thanks-header">
    <span class="thanks-header-text">RCX SALES</span>
  </div>
  <div class="thanks-container">
    <div class="thanks-card">
      <div class="thanks-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      </div>
      <h1 class="thanks-title">お問い合わせありがとうございます</h1>
      <p class="thanks-message">
        お問い合わせ内容を受け付けました。<br>
        担当者より折り返しご連絡いたしますので、<br>
        しばらくお待ちください。
      </p>
      <a href="https://rcx-service.com/" class="thanks-btn">トップページに戻る</a>
    </div>
  </div>
  <div class="thanks-footer">
    &copy; 2026 RCX SALES Inc. All Rights Reserved.
  </div>
</body>
</html>
